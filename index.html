<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact101 - @Important4Exams</title>
    <style>
        :root {
            --primary: #2d3436;
            --glass: rgba(255, 255, 255, 0.3);
            --card-shadow: 20px 20px 45px rgba(0,0,0,0.2);
            --light-glow: -12px -12px 30px rgba(255,255,255,0.8);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .app-container {
            width: 92%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 35px 22px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        #gyan-card {
            background-color: #ffffff; 
            border-radius: 35px;
            padding: 50px 25px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: var(--card-shadow), var(--light-glow);
            margin-bottom: 35px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #category {
            position: absolute;
            top: -18px;
            background: var(--primary);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        #card-content {
            font-size: 1.45rem;
            line-height: 1.5;
            color: #1a202c; 
            font-weight: 700;
        }

        #progress-text {
            font-size: 0.85rem;
            color: #2d3436;
            margin-bottom: 20px;
            font-weight: 800;
            background: rgba(255,255,255,0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 12px;
        }

        .button-group { display: flex; gap: 15px; }
        .btn-3d {
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Large attractive back arrow */
        #back-btn { 
            background: #ffffff; 
            color: #2d3436; 
            flex: 1; 
            font-size: 1.5rem; 
            line-height: 1;
        }
        
        #next-btn { background: var(--primary); color: #fff; flex: 2; font-size: 1rem; }
        
        .btn-3d:active:not(:disabled) { transform: scale(0.94); box-shadow: none; }
        .btn-3d:disabled { opacity: 0.4; cursor: not-allowed; }

        .support-btn {
            margin-top: 30px;
            display: inline-block;
            background: #ffffff;
            color: #2d3436;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .footer { margin-top: 25px; font-size: 0.85rem; color: #2d3436; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="progress-text">Fact101: 1 OF 10</div>
        <div id="gyan-card">
            <span id="category">Fact101</span>
            <div id="card-content">Initializing...</div>
        </div>
        <div class="button-group">
            <button id="back-btn" class="btn-3d">🔙</button>
            <button id="next-btn" class="btn-3d">Next Fact101 →</button>
        </div>
        <a href="https://upilinks.in/payment-link/upi925459343" target="_blank" class="support-btn">☕ Buy me a coffee</a>
        <div class="footer">Daily Gyan by <b>@Important4Exams</b></div>
    </div>
    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>
</body>
</html>
