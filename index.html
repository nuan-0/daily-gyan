<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Gyan - @Important4Exams</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow-dark: #a3b1c6;
            --shadow-light: #ffffff;
            --primary: #2c3e50;
        }

        /* 1. ANIMATED GRADIENT BACKGROUND (From previous version) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. GLASS APP CONTAINER */
        .app-container {
            width: 92%;
            max-width: 400px;
            background: rgba(224, 229, 236, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 3. THE 3D MAIN CONTENT BOX */
        #gyan-card {
            background-color: #fff; /* Default start */
            border-radius: 35px;
            padding: 50px 25px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* DEEP 3D SHADOWS */
            box-shadow: 15px 15px 30px var(--shadow-dark), 
                       -15px -15px 30px var(--shadow-light);
            margin-bottom: 35px;
            position: relative;
            transition: all 0.5s ease; /* Smooth color & movement transition */
        }

        #category {
            position: absolute;
            top: -15px;
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        #card-content {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #2c3e50;
            font-weight: 600;
        }

        /* 4. ALL BOXES IN 3D STYLE */
        #progress-text {
            display: inline-block;
            padding: 8px 20px;
            background: var(--bg);
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #718096;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            margin-bottom: 25px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-3d {
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        }

        #back-btn { background: var(--bg); color: #7f8c8d; flex: 1; }
        #next-btn { background: var(--primary); color: white; flex: 2; }

        .btn-3d:active:not(:disabled) {
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.96);
        }

        .btn-3d:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        /* Support Button 3D */
        .support-btn {
            margin-top: 30px;
            display: inline-block;
            background: var(--bg);
            color: #555;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #4a5568;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot { height: 8px; width: 8px; background: #2ecc71; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(46,204,113,0); } 100% { transform: scale(0.9); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="progress-text">CARD 1 OF 10</div>

        <div id="gyan-card">
            <span id="category">LOADING...</span>
            <div id="card-content">Initialising revision...</div>
        </div>

        <div class="button-group">
            <button id="back-btn" class="btn-3d">←</button>
            <button id="next-btn" class="btn-3d">Next Surprise →</button>
        </div>

        <a href="https://upilinks.in/payment-link/upi925459343" target="_blank" class="support-btn">☕ Support @Important4Exams</a>

        <div class="footer"><span class="dot"></span> <b>Daily Gyan</b> by @Important4Exams</div>
    </div>

    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>
</body>
</html>
