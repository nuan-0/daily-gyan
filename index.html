<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Gyan - @Important4Exams</title>
    <style>
        :root {
            --primary: #2d3436;
            --glass: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .app-container {
            width: 92%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 45px;
            padding: 35px 22px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

#gyan-card {
    background-color: #ffffff; 
    border-radius: 40px;
    padding: 50px 25px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* DARKER SHADOW for "Pop" */
    box-shadow: 18px 18px 40px rgba(0,0,0,0.2), -5px -5px 20px rgba(255,255,255,0.8);
    margin-bottom: 35px;
    position: relative;
    transition: background-color 0.4s ease, transform 0.2s ease;
    border: 2px solid rgba(255,255,255,0.5);
}

#card-title {
    font-size: 1.75rem; 
    font-weight: 900; 
    color: #000000; /* Pure Black for maximum contrast */
    line-height: 1.2; 
    margin-bottom: 15px;
}


        
        #category {
            position: absolute;
            top: -20px;
            background: var(--primary);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

#card-content {
    font-size: 1.2rem; 
    font-weight: 700; /* Made slightly bolder so it's not dim */
    color: #1a1a1a; 
    line-height: 1.5;
}

        #progress-text {
            font-size: 0.9rem;
            color: #2d3436;
            margin-bottom: 25px;
            font-weight: 900;
            background: rgba(255,255,255,0.5);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 15px;
        }

        .button-group { display: flex; gap: 15px; width: 100%; }

        #back-btn {
            flex: 1;
            background: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 2.2rem; 
            font-weight: 900;
            color: #2d3436;
            cursor: pointer;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #next-btn {
            flex: 2;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        #btn-text { font-size: 1.15rem; font-weight: 800; }
        #finish-date { font-size: 0.7rem; font-weight: 400; margin-top: 3px; display: none; }

        button:active { transform: scale(0.94); }
        button:disabled { cursor: not-allowed; }

        .support-btn {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ffffff;
            color: #2d3436;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.05rem;
            font-weight: 800;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.1);
        }

        .footer { margin-top: 25px; font-size: 0.9rem; color: #2d3436; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="progress-text">Card 1 of 10 today</div>

    <div id="gyan-card">
    <span id="category">GENERAL GYAN</span>
    
    <div id="card-title" style="font-size: 1.7rem; font-weight: 900; color: #1a202c; line-height: 1.2; margin-bottom: 15px;"></div>
    
    <div id="card-content" style="font-size: 1.1rem; font-weight: 600; color: #2d3436; line-height: 1.5;">Loading...</div>
</div>

        <div class="button-group">
            <button id="back-btn">⬅</button>
            <button id="next-btn">
                <span id="btn-text">Next Surprise →</span>
                <span id="finish-date"></span>
            </button>
        </div>

        <a href="https://razorpay.me/@NURA" target="_blank" class="support-btn">
            ☕ Buy Me a Coffee! ☕
        </a>

        <div class="footer">Daily Gyan by <b>@Important4Exams</b></div>
    </div>
    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>
</body>
</html>
