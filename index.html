<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
  /* This centers everything on the screen */
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; /* Takes full height of the browser */
    background: #e0e5ec; /* Light professional background */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* This is your main container */
  .container {
    width: 380px; /* Perfect width for mobile browsers */
    padding: 20px;
    background: #e0e5ec;
    box-shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff;
    border-radius: 30px;
    text-align: center;
  }

  /* Ensuring your 3D card looks solid */
  .card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    min-height: 200px;
    margin-bottom: 20px;
    box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Make sure the text is visible */
  #card-content {
    color: #333;
    font-size: 1.1rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div id="gyan-card" class="card">
    <span id="category" class="tag">Category</span>
    <h2 id="title">Daily Gyan</h2>
    <p id="content">Loading your daily revision...</p>
  </div>

  <div id="status-msg" class="status-bar">Post 1 of 10 today</div>

  <div class="nav-btns">
    <button id="fav-btn" title="Save Favorite">&#10084;</button>
    <button id="next-btn">Next Surprise &#10141;</button>
  </div>

  <a href="https://upilinks.in/payment-link/upi925459343" id="support-link" class="support-link">
    &#9749; Support my work with a tea!
  </a>

  <div id="fav-list">
    <strong>&#11088; My Revision List</strong>
    <ul id="favs-ul"></ul>
  </div>

  <script src="gyan_data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
