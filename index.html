<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Gyan - @Important4Exams</title>
    <style>
        :root {
            /* Neumorphic Palette */
            --bg: #e0e5ec;
            --primary: #2c3e50;
            --shadow-dark: #a3b1c6;
            --shadow-light: #ffffff;
        }

        /* 1. ANIMATED BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 2. MAIN APP CONTAINER */
        .app-container {
            width: 92%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        /* 3. THE 3D NEUMORPHIC CARD (MIDDLE AREA) */
        #gyan-card {
            background-color: var(--bg);
            border-radius: 40px;
            padding: 55px 25px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Neumorphic "Pop" Shadows */
            box-shadow: 18px 18px 30px var(--shadow-dark), 
                       -18px -18px 30px var(--shadow-light);
            margin-bottom: 40px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }

        /* Category Badge - Floating 3D */
        #category {
            position: absolute;
            top: -18px;
            background: linear-gradient(145deg, #34495e, #2c3e50);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        /* Main Content Text Area */
        .card-inner {
            width: 100%;
        }

        #card-content {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #4a5568;
            font-weight: 600;
            word-wrap: break-word;
        }

        /* 4. BUTTONS & UI */
        #progress-text {
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-common {
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            /* Neumorphic Button Style */
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
        }

        #back-btn {
            background: var(--bg);
            color: #7f8c8d;
            flex: 1;
        }

        #next-btn {
            background: var(--primary);
            color: white;
            flex: 2;
            box-shadow: 8px 8px 16px rgba(0,0,0,0.1), 
                        -4px -4px 10px rgba(255,255,255,0.1);
        }

        /* 3D Click Animation */
        .btn-common:active:not(:disabled) {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.97);
        }

        .btn-common:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 5. FOOTER & SUPPORT */
        .support-btn {
            margin-top: 35px;
            display: inline-block;
            background: var(--bg);
            color: #555;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                       -4px -4px 8px var(--shadow-light);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #718096;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="progress-text">CARD 1 OF 10</div>

        <div id="gyan-card">
            <span id="category">LOADING...</span>
            <div class="card-inner">
                <div id="card-content">Initialising your daily revision...</div>
            </div>
        </div>

        <div class="button-group">
            <button id="back-btn" class="btn-common">←</button>
            <button id="next-btn" class="btn-common">Next Surprise →</button>
        </div>

        <a href="https://upilinks.in/payment-link/upi925459343" target="_blank" class="support-btn">
            ☕ Support @Important4Exams
        </a>

        <div class="footer">
            <span class="status-dot"></span> <b>Daily Gyan</b> by @Important4Exams
        </div>
    </div>

    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>

</body>
</html>
