<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Gyan - @Important4Exams</title>
    <style>
        /* 1. GLOBAL RESET & CENTERING */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135px, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            color: #2c3e50;
        }

        /* 2. MAIN APP CONTAINER */
        .app-container {
            width: 92%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* 3. THE 3D GYAN CARD */
        #gyan-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 45px 25px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 8px 8px 16px #e6e9ee, inset -8px -8px 16px #ffffff;
            margin-bottom: 25px;
            position: relative;
            border: 1px solid #ebf0f5;
            transition: background-color 0.4s ease;
        }

        /* Subject / Category Badge */
        #category {
            position: absolute;
            top: 20px;
            background: #34495e;
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Fact Text */
        #card-content {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #2c3e50;
            font-weight: 600;
            word-wrap: break-word;
        }

        /* 4. PROGRESS & BUTTONS */
        #progress-text {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #next-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(44, 62, 80, 0.25);
        }

        #next-btn:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }

        #next-btn:active {
            transform: translateY(1px);
        }

        #next-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* 5. SUPPORT & FOOTER */
        .support-btn {
            margin-top: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #555;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid #e1e8ed;
            font-weight: 500;
            transition: all 0.2s;
        }

        .support-btn:hover {
            background: #f8f9fa;
            border-color: #ccd6dd;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .footer-text b {
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="gyan-card">
            <span id="category">LOADING...</span>
            <div id="card-content">Initializing your daily revision...</div>
        </div>

        <div id="progress-text">Card 1 of 10 today</div>

        <button id="next-btn">Next Surprise →</button>

        <a href="https://upilinks.in/payment-link/upi925459343" target="_blank" class="support-btn">
            ☕ Support @Important4Exams
        </a>

        <div class="footer-text">Daily Gyan by <b>@Important4Exams</b></div>
    </div>

    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>

</body>
</html>
