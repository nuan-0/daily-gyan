<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact101 - @Important4Exams</title>
    <style>
        :root {
            --primary: #2d3436;
            --glass: rgba(255, 255, 255, 0.25);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .app-container {
            width: 92%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 45px;
            padding: 35px 22px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* THE 3D MAIN BOX - FIXED COLOR & SHADOW */
        #gyan-card {
            background-color: #ffffff; 
            border-radius: 40px;
            padding: 50px 25px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 15px 15px 35px rgba(0,0,0,0.25), 
                        inset -5px -5px 15px rgba(255,255,255,0.9);
            margin-bottom: 35px;
            position: relative;
            transition: background-color 0.5s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        #category {
            position: absolute;
            top: -20px;
            background: var(--primary);
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase;
            z-index: 10;
        }

        #card-content {
            font-size: 1.5rem;
            line-height: 1.5;
            color: #1a202c; 
            font-weight: 800;
        }

        #progress-text {
            font-size: 0.9rem;
            color: #2d3436;
            margin-bottom: 25px;
            font-weight: 900;
            background: rgba(255,255,255,0.6);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 15px;
        }

        .button-group { display: flex; gap: 15px; width: 100%; }

        /* BOLD 3D BACK ARROW */
        #back-btn {
            flex: 1;
            background: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 2rem; 
            font-weight: 900;
            color: #2d3436;
            cursor: pointer;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #next-btn {
            flex: 2;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.2);
        }

        button:active { transform: scale(0.92); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* COFFEE BUTTON FIXED */
        .support-btn {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ffffff;
            color: #2d3436;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.05rem;
            font-weight: 800;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.1);
        }

        .footer { margin-top: 25px; font-size: 0.9rem; color: #2d3436; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="progress-text">Fact101: 1 OF 10</div>
        <div id="gyan-card">
            <span id="category">Fact101</span>
            <div id="card-content">Loading...</div>
        </div>
        <div class="button-group">
            <button id="back-btn">⬅</button>
            <button id="next-btn">Next Fact101 →</button>
        </div>
        <a href="https://upilinks.in/payment-link/upi925459343" target="_blank" class="support-btn">
            ☕ Buy Me a Coffee ☕
        </a>
        <div class="footer">Daily Gyan by <b>@Important4Exams</b></div>
    </div>
    <script src="gyan_data.js"></script>
    <script src="popup.js"></script>
</body>
</html>
